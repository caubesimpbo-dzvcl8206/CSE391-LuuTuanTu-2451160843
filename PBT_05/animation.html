<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopTLU - Hiệu ứng Animations</title>
    <link rel="stylesheet" href="animations.css">
</head>
<body>

    <div class="loader-container">
        <div class="loading-spinner"></div>
        <p>Đang tải sản phẩm mới...</p>
    </div>

    <div class="container">
        <h2 class="section-title">Trải nghiệm Hiệu ứng Tương tác</h2>
        
        <div class="product-grid">
            
            <div class="product-card fade-in-scroll">
                
                <div class="img-zoom-container">
                    <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='200' viewBox='0 0 300 200'><rect width='100%' height='100%' fill='%233498db'/><text x='50%' y='50%' font-family='Arial' font-size='16' fill='%23ffffff' font-weight='bold' text-anchor='middle'>Laptop Gaming ASUS</text></svg>" alt="Laptop ASUS">
                </div>
                
                <div class="card-info">
                    <h3>ASUS ROG Strix G16</h3>
                    <p class="price">34.500.000đ</p>
                    
                    <button class="btn-buy-now">Mua ngay</button>
                </div>
            </div>

            <div class="product-card fade-in-scroll" style="animation-delay: 0.15s;">
                <div class="img-zoom-container">
                    <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='200' viewBox='0 0 300 200'><rect width='100%' height='100%' fill='%23e74c3c'/><text x='50%' y='50%' font-family='Arial' font-size='16' fill='%23ffffff' font-weight='bold' text-anchor='middle'>MacBook Pro M3</text></svg>" alt="MacBook">
                </div>
                <div class="card-info">
                    <h3>MacBook Pro 14" M3</h3>
                    <p class="price">39.990.000đ</p>
                    <button class="btn-buy-now">Mua ngay</button>
                </div>
            </div>

            <div class="product-card fade-in-scroll" style="animation-delay: 0.3s;">
                <div class="img-zoom-container">
                    <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='200' viewBox='0 0 300 200'><rect width='100%' height='100%' fill='%232ecc71'/><text x='50%' y='50%' font-family='Arial' font-size='16' fill='%23ffffff' font-weight='bold' text-anchor='middle'>iPhone 15 Pro</text></svg>" alt="iPhone">
                </div>
                <div class="card-info">
                    <h3>iPhone 15 Pro Max</h3>
                    <p class="price">29.990.000đ</p>
                    <button class="btn-buy-now">Mua ngay</button>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
