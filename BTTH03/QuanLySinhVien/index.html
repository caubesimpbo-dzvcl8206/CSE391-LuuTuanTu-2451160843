<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Quản lý Sinh viên</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">
        <h1>Quản lý Sinh viên</h1>

        <div class="action-bar">
            <button class="btn btn-add" id="btn-open-modal">➕ Thêm sinh viên mới</button>
            <div id="toast-msg"></div>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Mã SV</th>
                    <th>Họ và tên</th>
                    <th>Ngày sinh</th>
                    <th>Lớp học</th>
                    <th>Email</th>
                    <th>Điểm TB</th>
                    <th style="width: 150px;">Tuỳ chỉnh</th>
                </tr>
            </thead>
            <tbody id="student-table-body">
            </tbody>
        </table>

        <div class="statistics-box">
            <div class="stat-card">
                <h3>Tổng số sinh viên</h3>
                <p id="stat-total">0</p>
            </div>
            <div class="stat-card gpa">
                <h3>Điểm trung bình cả lớp</h3>
                <p id="stat-avg-gpa">0.00</p>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Thêm Sinh Viên Mới</h2>
                <button class="btn btn-close" id="btn-close-modal">✖</button>
            </div>
            <form id="student-form">
                <input type="hidden" id="form-mode" value="">

                <div class="form-group">
                    <label for="student-id">Mã sinh viên *</label>
                    <input type="text" id="student-id" class="form-control" required placeholder="Ví dụ: B26DCCN001">
                </div>
                <div class="form-group">
                    <label for="student-name">Họ và tên *</label>
                    <input type="text" id="student-name" class="form-control" required placeholder="Ví dụ: Nguyễn Văn A">
                </div>
                <div class="form-group">
                    <label for="student-dob">Ngày sinh *</label>
                    <input type="date" id="student-dob" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="student-class">Lớp học *</label>
                    <input type="text" id="student-class" class="form-control" required placeholder="Ví dụ: CNPM01">
                </div>
                <div class="form-group">
                    <label for="student-email">Email *</label>
                    <input type="email" id="student-email" class="form-control" required placeholder="Ví dụ: sv@tlu.edu.vn">
                </div>
                <div class="form-group">
                    <label for="student-gpa">Điểm trung bình *</label>
                    <input type="number" id="student-gpa" class="form-control" min="0" max="10" step="0.1" required placeholder="Thang điểm 10 (Ví dụ: 8.5)">
                </div>
                
                <button type="submit" class="btn btn-submit" id="btn-submit-form">Lưu dữ liệu</button>
            </form>
        </div>
    </div>

    <script src="js/QuanLy.js"></script>
</body>
</html>
